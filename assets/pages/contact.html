<html lang="en">

  <head>

    <meta charset="utf-8">

    <link rel="stylesheet" type="text/css" href="../css/font-awesome.css">
    <link rel="stylesheet" href="../css/templatemo-hexashop.css">

    <link rel="stylesheet" href="../css/style.css">
    </head>
    
    <body>

    <header class="header-area header-sticky">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <nav class="main-nav">
                        <a href="../../index.html" class="logo">
                            <img src="../images/logo.png">
                        </a>
                        <ul class="nav">
                            <!-- Dinamicko ispisvanje sa json podacima -->
                        </ul>        
                        <a class='menu-trigger'>
                            <span>Menu</span>
                        </a>
                    </nav>
                </div>
            </div>
        </div>
    </header>
    <!-- ***** Header Area End ***** -->

    <!-- ***** Main Banner Area Start ***** -->
    <div class="page-heading about-page-heading" id="top">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="inner-content">
                        <h2>Sign In</h2>
                        <span>Become a Hexashop member!</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- ***** Main Banner Area End ***** -->

    <!-- ***** Contact Area Starts ***** -->
    <div class="contact-us">
        <div class="container">
            <div class="row">
                <div class="col-lg-6">
                    <div id="map">
                      <!-- You can simply copy and paste "Embed a map" code from Google Maps for any location. -->
                      <iframe width="100%" height="400" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" id="gmap_canvas" src="https://maps.google.com/maps?width=520&amp;height=400&amp;hl=en&amp;q=srpskog%20husarskog%20puka%20%20Belgrade+()&amp;t=&amp;z=12&amp;ie=UTF8&amp;iwloc=B&amp;output=embed"></iframe> <a href='https://www.easybooking.eu/'>Hotel Software</a> <script type='text/javascript' src='https://embedmaps.com/google-maps-authorization/script.js?id=b3772b3721a66ae8eac11699ae40cfd50399f6cb'></script>                
                    </div>
                </div>
                <div class="col-lg-6">
                    <div id="signInContainer" class="container my-5 alert alert-success">
                      <h1>Welcome!</h1>
                      <div id="welcomeMessage" class="alert alert-success my-5"></div>
                      <button id="signOutButton" class="btn btn-primary" onclick="signOut()">Sign Out</button>
                    </div>
                    <div id="signedOut">
                      <div class="section-heading">
                        <h2>Sign in </h2>
                        <span>Sign in to your account to access exclusive features and personalized content.</span>
                    </div>
                    <form class="forma" id="forma">
                      <div class="form-row">
                        <div class="form-group col-md-6">
                          <label for="firstName">First Name</label>
                          <input type="text" class="form-control" id="firstName" name="firstName" placeholder="First Name">
                          <p class="errorMessage"></p>
                        </div>
                        <div class="form-group col-md-6">
                          <label for="lastName">Last Name</label>
                          <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Last Name">
                          <p class="errorMessage"></p>
                        </div>
                      </div>
                
                      <div class="form-group">
                        <label for="emaill">Email</label>
                        <input type="email" class="form-control" id="emaill" name="emaill" placeholder="Email">
                        <p class="errorMessage"></p>
                      </div>
                
                      <div class="form-group">
                        <label for="country">Age Group</label>
                        <select class="select" id="country" required>
                          <option value="0" style="color: #aaa">Select your age group</option>
                          <option value="1">Under 18</option>
                          <option value="2">18-24</option>
                          <option value="3">25-34</option>
                          <option value="4">35-44</option>
                          <option value="5">45-54</option>
                          <option value="6">55-64</option>
                          <option value="7">65+</option>
                        </select>
                        <p class="errorMessage"></p>
                      </div>
                      <div class="row">
                        <div class="form-group col-6">
                          <label>Gender</label>
                          <div class="form-check">
                            <input class="form-check-input" name="rbGender" type="radio" name="gender" id="male" value="male" required>
                            <label class="form-check-label" for="male">Male</label>
                          </div>
                          <div class="form-check">
                            <input class="form-check-input" name="rbGender" type="radio" name="gender" id="female" value="female" required>
                            <label class="form-check-label" for="female">Female</label>
                          </div>
                          <p class="errorMessage"></p>
                        </div>
                        <div class="form-group">
                          <label>Interests</label>
                          <div class="form-check">
                            <input class="form-check-input" name="cbInterest" type="checkbox" id="music" value="music">
                            <label class="form-check-label" for="music">Music</label>
                          </div>
                          <div class="form-check">
                            <input class="form-check-input" name="cbInterest" type="checkbox" id="sports" value="sports">
                            <label class="form-check-label" for="sports">Sports</label>
                          </div>
                          <div class="form-check">
                            <input class="form-check-input" name="cbInterest" type="checkbox" id="movies" value="movies">
                            <label class="form-check-label" for="movies">Movies</label>
                          </div>
                          <p class="errorMessage"></p>
                        </div>
                      </div>
                      <fieldset>
                        <button type="button" id="form-submit" class="main-dark-button" onclick="sumitovanje()"><i class="fa fa-paper-plane"></i></button>
                      </fieldset>
                      <p class="alert alert-success my-3" id="success">

                      </p>
                    </form>
                    </div>
                    
                </div>
                
            </div>
            
        </div>
    </div>
    <footer>
        <div class="container">
            <div class="row" id="footer">
                <!-- Dinamicki ispisan -->
            </div>
        </div>
    </footer>

    <script>
        $(function() {
            var selectedClass = "";
            $("p").click(function(){
            selectedClass = $(this).attr("data-rel");
            $("#portfolio").fadeTo(50, 0.1);
                $("#portfolio div").not("."+selectedClass).fadeOut();
            setTimeout(function() {
              $("."+selectedClass).fadeIn();
              $("#portfolio").fadeTo(50, 1);
            }, 500);
                
            });
        });

    </script>

  </body>

</html>
